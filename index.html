<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tekken 3 - Multiplayer WebRTC Controller</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden; 
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        /* --- HOST (LAPTOP) STYLES --- */
        #host-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 40px; /* Space between game and QR side panels */
        }
        
        /* Side panels for QR codes */
        .side-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            /* We use visibility instead of display:none so the game doesn't shift when a panel hides */
            visibility: visible; 
            transition: opacity 0.5s ease;
            width: 180px;
        }
        .side-panel h3 { margin-top: 0; margin-bottom: 5px; font-size: 24px; }
        .side-panel p { margin-bottom: 20px; font-size: 14px; text-align: center; color: #aaa; }
        
        .p1-color { color: #4CAF50; }
        .p2-color { color: #2196F3; }

        #game-container {
            width: 800px;
            height: 600px;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            background: #000;
        }

        /* --- CLIENT (MOBILE) STYLES --- */
        #mobile-controller {
            display: none; 
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100dvw;
            height: 100dvh;
            transform: translate(-50%, -50%); 
            flex-direction: column;
            justify-content: space-around;
            padding: 20px;
            box-sizing: border-box;
        }
        @media screen and (orientation: portrait) {
            #mobile-controller {
                width: 100dvh; 
                height: 100dvw;
                transform: translate(-50%, -50%) rotate(90deg); 
            }
        }
        .controller-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        
        .d-pad, .action-buttons {
            display: grid;
            grid-template-columns: repeat(3, 85px); 
            grid-gap: 4px; 
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #555;
            border-radius: 8px;
            width: 85px; 
            height: 85px; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 28px; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .btn:active { background: #fff; color: #000; }
        
        #fullscreenToggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: white;
            z-index: 1000;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #fullscreenToggle:active { background: #d32f2f; border-color: white; }
        
        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        
        .triangle { grid-column: 2; grid-row: 1; }
        .square { grid-column: 1; grid-row: 2; }
        .circle { grid-column: 3; grid-row: 2; }
        .cross { grid-column: 2; grid-row: 2; }

        .center-controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            margin: 0 auto;
        }

        .pill-btn {
            width: 100px;
            height: 45px;
            border-radius: 25px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="host-container">
        <div id="side-p1" class="side-panel">
            <h3 class="p1-color">Player 1</h3>
            <p>Scan to connect</p>
            <div id="qrcode-p1"></div>
        </div>
        
        <div id="game-container"></div>
        
        <div id="side-p2" class="side-panel">
            <h3 class="p2-color">Player 2</h3>
            <p>Scan to connect</p>
            <div id="qrcode-p2"></div>
        </div>
    </div>

    <div id="mobile-controller">
        <div id="fullscreenToggle" onclick="toggleFullScreen()">⛶</div>
        <h2 id="mobileTitle" style="text-align: center; margin: 0; padding-top: 10px;">Tekken 3 Controller</h2>
        
        <div class="controller-row">
            <div class="d-pad">
                <div class="btn up" onpointerdown="sendInput('UP', 'keydown')" onpointerup="sendInput('UP', 'keyup')" onpointercancel="sendInput('UP', 'keyup')">↑</div>
                <div class="btn left" onpointerdown="sendInput('LEFT', 'keydown')" onpointerup="sendInput('LEFT', 'keyup')" onpointercancel="sendInput('LEFT', 'keyup')">←</div>
                <div class="btn right" onpointerdown="sendInput('RIGHT', 'keydown')" onpointerup="sendInput('RIGHT', 'keyup')" onpointercancel="sendInput('RIGHT', 'keyup')">→</div>
                <div class="btn down" onpointerdown="sendInput('DOWN', 'keydown')" onpointerup="sendInput('DOWN', 'keyup')" onpointercancel="sendInput('DOWN', 'keyup')">↓</div>
            </div>
            
            <div class="center-controls">
                <div class="btn pill-btn" onpointerdown="sendInput('SELECT', 'keydown')" onpointerup="sendInput('SELECT', 'keyup')" onpointercancel="sendInput('SELECT', 'keyup')">SELECT</div>
                <div class="btn pill-btn" onpointerdown="sendInput('START', 'keydown')" onpointerup="sendInput('START', 'keyup')" onpointercancel="sendInput('START', 'keyup')">START</div>
            </div>

            <div class="action-buttons">
                <div class="btn triangle" onpointerdown="sendInput('TRIANGLE', 'keydown')" onpointerup="sendInput('TRIANGLE', 'keyup')" onpointercancel="sendInput('TRIANGLE', 'keyup')">△</div>
                <div class="btn square" onpointerdown="sendInput('SQUARE', 'keydown')" onpointerup="sendInput('SQUARE', 'keyup')" onpointercancel="sendInput('SQUARE', 'keyup')">□</div>
                <div class="btn circle" onpointerdown="sendInput('CIRCLE', 'keydown')" onpointerup="sendInput('CIRCLE', 'keyup')" onpointercancel="sendInput('CIRCLE', 'keyup')">○</div>
                <div class="btn cross" onpointerdown="sendInput('CROSS', 'keydown')" onpointerup="sendInput('CROSS', 'keyup')" onpointercancel="sendInput('CROSS', 'keyup')">✖</div>
            </div>
        </div>
        
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('join');
        const playerNum = urlParams.get('p') || '1'; 

        // Define separate key mappings for Player 1 and Player 2
        const keyMap = {
            '1': {
                'UP': { key: 'ArrowUp', keyCode: 38 },
                'DOWN': { key: 'ArrowDown', keyCode: 40 },
                'LEFT': { key: 'ArrowLeft', keyCode: 37 },
                'RIGHT': { key: 'ArrowRight', keyCode: 39 },
                'CROSS': { key: 'x', keyCode: 88 },
                'CIRCLE': { key: 's', keyCode: 83 },
                'SQUARE': { key: 'z', keyCode: 90 },
                'TRIANGLE': { key: 'a', keyCode: 65 },
                'START': { key: 'Enter', keyCode: 13 },
                'SELECT': { key: 'Shift', keyCode: 16 } 
            },
            '2': {
                'UP': { key: 'i', keyCode: 73 },       
                'DOWN': { key: 'k', keyCode: 75 },     
                'LEFT': { key: 'j', keyCode: 74 },     
                'RIGHT': { key: 'l', keyCode: 76 },    
                'CROSS': { key: 'g', keyCode: 71 },    
                'CIRCLE': { key: 'h', keyCode: 72 },   
                'SQUARE': { key: 'f', keyCode: 70 },   
                'TRIANGLE': { key: 't', keyCode: 84 }, 
                'START': { key: 'v', keyCode: 86 },    
                'SELECT': { key: 'b', keyCode: 66 }    
            }
        };

        const peer = new Peer();
        let connection;

        if (joinId) {
            // ==========================================
            // CLIENT LOGIC (MOBILE CONTROLLER)
            // ==========================================
            document.getElementById('host-container').style.display = 'none';
            document.getElementById('mobile-controller').style.display = 'flex';
            
            const titleEl = document.getElementById('mobileTitle');
            titleEl.innerText = `Tekken 3 Controller - Player ${playerNum}`;
            titleEl.style.color = playerNum === '1' ? '#4CAF50' : '#2196F3';

            peer.on('open', () => {
                // Pass player number as metadata so the host instantly knows who is connecting
                connection = peer.connect(joinId, { metadata: { player: playerNum } });
                
                connection.on('open', () => {
                    console.log(`Connected to laptop as Player ${playerNum}!`);
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                });
            });

            window.sendInput = function(btnName, eventType) {
                if (connection && connection.open) {
                    connection.send({ player: playerNum, button: btnName, type: eventType });
                }
            };

            window.toggleFullScreen = function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(e => {});
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            };

            document.body.addEventListener('pointerdown', () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e => {});
            }, { once: true });

        } else {
            // ==========================================
            // HOST LOGIC (LAPTOP / EMULATOR)
            // ==========================================
            peer.on('open', (myId) => {
                const currentUrl = window.location.href.split('?')[0];
                const linkP1 = `${currentUrl}?join=${myId}&p=1`;
                const linkP2 = `${currentUrl}?join=${myId}&p=2`;

                new QRCode(document.getElementById('qrcode-p1'), {
                    text: linkP1, width: 150, height: 150, colorDark: "#000000", colorLight: "#ffffff"
                });
                new QRCode(document.getElementById('qrcode-p2'), {
                    text: linkP2, width: 150, height: 150, colorDark: "#000000", colorLight: "#ffffff"
                });

                // Handle multiple connections
                peer.on('connection', (conn) => {
                    // Extract player number from the connection metadata
                    const pNum = conn.metadata ? conn.metadata.player : null;

                    conn.on('open', () => {
                        // Fade out the respective QR panel, but keep its physical space so the game doesn't shift
                        if (pNum === '1') {
                            const p1Panel = document.getElementById('side-p1');
                            p1Panel.style.opacity = '0';
                            setTimeout(() => p1Panel.style.visibility = 'hidden', 500);
                        } else if (pNum === '2') {
                            const p2Panel = document.getElementById('side-p2');
                            p2Panel.style.opacity = '0';
                            setTimeout(() => p2Panel.style.visibility = 'hidden', 500);
                        }
                    });

                    conn.on('data', (data) => {
                        if(data.player && data.button && data.type) {
                            triggerKeystroke(data.player, data.button, data.type);
                        }
                    });
                });
            });

            function triggerKeystroke(playerNum, btnName, eventType) {
                const keyData = keyMap[playerNum][btnName];
                if (!keyData) return;

                const targetElement = document.querySelector('#game-container canvas') || window;

                let physCode = keyData.key;
                if (!physCode.startsWith('Arrow') && physCode !== 'Enter' && physCode !== 'Shift') {
                    physCode = 'Key' + physCode.toUpperCase(); 
                } else if (physCode === 'Shift') {
                    physCode = 'ShiftLeft';
                }

                const event = new KeyboardEvent(eventType, {
                    key: keyData.key,
                    code: physCode,
                    keyCode: keyData.keyCode,
                    which: keyData.keyCode,
                    bubbles: true,
                    cancelable: true,
                    composed: true
                });

                Object.defineProperty(event, 'keyCode', { get: () => keyData.keyCode });
                Object.defineProperty(event, 'which', { get: () => keyData.keyCode });

                targetElement.dispatchEvent(event);
            }

            // --- AUTOMATICALLY MAP PLAYER 1 & 2 CONTROLS ---
            window.EJS_defaultControls = {
                0: { // Player 1
                    0: { value: 'x' },         // Cross
                    1: { value: 'z' },         // Square
                    2: { value: 'Shift' },     // Select
                    3: { value: 'Enter' },     // Start
                    4: { value: 'up arrow' },   // Up
                    5: { value: 'down arrow' }, // Down
                    6: { value: 'left arrow' }, // Left
                    7: { value: 'right arrow' },// Right
                    8: { value: 's' },         // Circle
                    9: { value: 'a' }          // Triangle
                },
                1: { // Player 2
                    0: { value: 'g' }, // Cross
                    1: { value: 'f' }, // Square
                    2: { value: 'b' }, // Select
                    3: { value: 'v' }, // Start
                    4: { value: 'i' }, // Up
                    5: { value: 'k' }, // Down
                    6: { value: 'j' }, // Left
                    7: { value: 'l' }, // Right
                    8: { value: 'h' }, // Circle
                    9: { value: 't' }  // Triangle
                }
            };

            // --- INITIALIZE EMULATOR JS ---
            window.EJS_player = '#game-container'; 
            window.EJS_core = 'psx';               
            window.EJS_gameName = 'Tekken 3';      
            window.EJS_color = '#d32f2f';          
            window.EJS_gameUrl = 'https://huggingface.co/datasets/alihxn/compressed_game/resolve/main/tekken3.chd';    
            window.EJS_biosUrl = 'scph5501.bin'; 
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';

            const script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/latest/data/loader.js';
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
