<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tekken 3 - Multiplayer WebRTC Controller</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden; 
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        /* --- HOST (LAPTOP) STYLES --- */
        #host-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 40px;
        }
        
        .side-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 220px;
        }
        .side-panel h3 { margin-top: 0; margin-bottom: 5px; font-size: 20px; }
        .side-panel p { margin-bottom: 20px; font-size: 14px; text-align: center; color: #aaa; }
        
        .status-container {
            margin-top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .player-status {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .p1-color { color: #4CAF50; }
        .p2-color { color: #2196F3; }

        #qrcode {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        #game-container {
            width: 800px;
            height: 600px;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            background: #000;
        }

        /* --- CLIENT (MOBILE) STYLES --- */
        #mobile-controller {
            display: none; 
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100dvw;
            height: 100dvh;
            transform: translate(-50%, -50%); 
            flex-direction: column;
            justify-content: space-around;
            padding: 20px;
            box-sizing: border-box;
        }
        @media screen and (orientation: portrait) {
            #mobile-controller {
                width: 100dvh; 
                height: 100dvw;
                transform: translate(-50%, -50%) rotate(90deg); 
            }
            #joystick-ui {
                transform: rotate(-90deg);
            }
        }
        .controller-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            opacity: 0.5;
            pointer-events: none; /* Disabled until assigned */
            transition: opacity 0.3s;
        }
        .controller-row.active {
            opacity: 1;
            pointer-events: all;
        }
        
        /* Movement Wrapper */
        .movement-wrapper {
            position: relative;
            width: 263px;
            height: 174px; 
        }

        .d-pad, .action-buttons {
            display: grid;
            grid-template-columns: repeat(3, 85px); 
            grid-gap: 4px; 
        }
        .action-buttons{
            grid-template-columns: repeat(2, 85px); 
        }

        #joystick-ui {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none; 
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #555;
            border-radius: 8px;
            width: 85px; 
            height: 85px; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 28px; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .btn:active { background: #fff; color: #000; }
        
        #fullscreenToggle, #toggleInputBtn {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 1000;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #fullscreenToggle { top: 20px; right: 20px; width: 40px; height: 40px; font-size: 20px; }
        #fullscreenToggle:active { background: #d32f2f; border-color: white; }

        #toggleInputBtn { top: 20px; left: 20px; height: 40px; padding: 0 15px; font-size: 16px; font-weight: bold; }
        #toggleInputBtn:active { background: #555; border-color: white; }
        
        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        
        .triangle { grid-column: 1; grid-row: 1; }
        .square { grid-column: 2; grid-row: 1; }
        .circle { grid-column: 2; grid-row: 2; }
        .cross { grid-column: 1; grid-row: 2; }

        .center-controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            margin: 0 auto;
        }

        .pill-btn { width: 100px; height: 45px; border-radius: 25px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="host-container">
        <div class="side-panel">
            <h3>Join Game</h3>
            <p>Scan to connect controllers</p>
            <div id="qrcode"></div>
            
            <div class="status-container">
                <div class="player-status p1-color">
                    <span>Player 1</span>
                    <span id="status-p1">Waiting...</span>
                </div>
                <div class="player-status p2-color">
                    <span>Player 2</span>
                    <span id="status-p2">Waiting...</span>
                </div>
            </div>
        </div>
        
        <div id="game-container"></div>
    </div>

    <div id="mobile-controller">
        <div id="toggleInputBtn" onclick="toggleInputMethod()">🕹️ Use Joystick</div>
        <div id="fullscreenToggle" onclick="toggleFullScreen()">⛶</div>
        <h2 id="mobileTitle" style="text-align: center; margin: 0; padding-top: 10px; color: #aaa;">Connecting to Host...</h2>
        
        <div class="controller-row" id="controllerArea">
            
            <div class="movement-wrapper">
                <div class="d-pad" id="dpad-ui">
                    <div class="btn up" onpointerdown="sendInput('UP', 'keydown')" onpointerup="sendInput('UP', 'keyup')" onpointercancel="sendInput('UP', 'keyup')">↑</div>
                    <div class="btn left" onpointerdown="sendInput('LEFT', 'keydown')" onpointerup="sendInput('LEFT', 'keyup')" onpointercancel="sendInput('LEFT', 'keyup')">←</div>
                    <div class="btn right" onpointerdown="sendInput('RIGHT', 'keydown')" onpointerup="sendInput('RIGHT', 'keyup')" onpointercancel="sendInput('RIGHT', 'keyup')">→</div>
                    <div class="btn down" onpointerdown="sendInput('DOWN', 'keydown')" onpointerup="sendInput('DOWN', 'keyup')" onpointercancel="sendInput('DOWN', 'keyup')">↓</div>
                </div>
                <div id="joystick-ui"></div>
            </div>
            
            <div class="center-controls">
                <div class="btn pill-btn" onpointerdown="sendInput('SELECT', 'keydown')" onpointerup="sendInput('SELECT', 'keyup')" onpointercancel="sendInput('SELECT', 'keyup')">SELECT</div>
                <div class="btn pill-btn" onpointerdown="sendInput('START', 'keydown')" onpointerup="sendInput('START', 'keyup')" onpointercancel="sendInput('START', 'keyup')">START</div>
            </div>

            <div class="action-buttons">
                <div class="btn triangle" onpointerdown="sendInput('TRIANGLE', 'keydown')" onpointerup="sendInput('TRIANGLE', 'keyup')" onpointercancel="sendInput('TRIANGLE', 'keyup')">△</div>
                <div class="btn square" onpointerdown="sendInput('SQUARE', 'keydown')" onpointerup="sendInput('SQUARE', 'keyup')" onpointercancel="sendInput('SQUARE', 'keyup')">□</div>
                <div class="btn circle" onpointerdown="sendInput('CIRCLE', 'keydown')" onpointerup="sendInput('CIRCLE', 'keyup')" onpointercancel="sendInput('CIRCLE', 'keyup')">○</div>
                <div class="btn cross" onpointerdown="sendInput('CROSS', 'keydown')" onpointerup="sendInput('CROSS', 'keyup')" onpointercancel="sendInput('CROSS', 'keyup')">✖</div>
            </div>
        </div>
        
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('join');
        
        // Host state
        let availableSlots = [1, 2];
        let activeClients = {}; // Maps peerId -> playerNum

        // Client state
        let myPlayerNum = null;

        const keyMap = {
            '1': {
                'UP': { key: 'ArrowUp', keyCode: 38 },
                'DOWN': { key: 'ArrowDown', keyCode: 40 },
                'LEFT': { key: 'ArrowLeft', keyCode: 37 },
                'RIGHT': { key: 'ArrowRight', keyCode: 39 },
                'CROSS': { key: 'x', keyCode: 88 },
                'CIRCLE': { key: 's', keyCode: 83 },
                'SQUARE': { key: 'z', keyCode: 90 },
                'TRIANGLE': { key: 'a', keyCode: 65 },
                'START': { key: 'Enter', keyCode: 13 },
                'SELECT': { key: 'Shift', keyCode: 16 } 
            },
            '2': {
                'UP': { key: 'i', keyCode: 73 },       
                'DOWN': { key: 'k', keyCode: 75 },     
                'LEFT': { key: 'j', keyCode: 74 },     
                'RIGHT': { key: 'l', keyCode: 76 },    
                'CROSS': { key: 'g', keyCode: 71 },    
                'CIRCLE': { key: 'h', keyCode: 72 },   
                'SQUARE': { key: 'f', keyCode: 70 },   
                'TRIANGLE': { key: 't', keyCode: 84 }, 
                'START': { key: 'v', keyCode: 86 },    
                'SELECT': { key: 'b', keyCode: 66 }    
            }
        };

        const peer = new Peer();
        let connection;

        if (joinId) {
            // ==========================================
            // CLIENT LOGIC (MOBILE CONTROLLER)
            // ==========================================
            document.getElementById('host-container').style.display = 'none';
            document.getElementById('mobile-controller').style.display = 'flex';

            peer.on('open', () => {
                connection = peer.connect(joinId); // Connect without requesting a specific player
                
                connection.on('open', () => {
                    console.log(`Connected to host, awaiting assignment...`);
                });

                connection.on('data', (data) => {
                    // Host assigns us a player number
                    if (data.action === 'assign_player') {
                        myPlayerNum = data.playerNum.toString();
                        
                        // Update UI
                        const titleEl = document.getElementById('mobileTitle');
                        titleEl.innerText = `Tekken 3 Controller - Player ${myPlayerNum}`;
                        titleEl.style.color = myPlayerNum === '1' ? '#4CAF50' : '#2196F3';
                        document.getElementById('controllerArea').classList.add('active');

                        if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                    } 
                    else if (data.action === 'full') {
                        document.getElementById('mobileTitle').innerText = "Game is Full!";
                        document.getElementById('mobileTitle').style.color = "#d32f2f";
                    }
                });
            });

            window.sendInput = function(btnName, eventType) {
                if (connection && connection.open && myPlayerNum) {
                    // No need to send our player number, the host tracks it via our connection ID
                    connection.send({ button: btnName, type: eventType });
                }
            };

            window.toggleFullScreen = function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(e => {});
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            };

            document.body.addEventListener('pointerdown', () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e => {});
            }, { once: true });

            // --- JOYSTICK LOGIC ---
            let joystickInstance;
            let activeJoyKeys = new Set();
            const joyThreshold = 0.35; 

            function initJoystick() {
                joystickInstance = nipplejs.create({
                    zone: document.getElementById('joystick-ui'),
                    mode: 'static',
                    position: { left: '50%', top: '50%' },
                    color: 'white',
                    size: 130
                });

                joystickInstance.on('move', (evt, data) => {
                    if (!data.vector) return;
                    const newKeys = new Set();
                    
                    if(window.innerHeight > window.innerWidth){
                        if (data.vector.x > joyThreshold) newKeys.add('UP');
                        if (data.vector.x < -joyThreshold) newKeys.add('DOWN');
                        if (data.vector.y > joyThreshold) newKeys.add('LEFT');
                        if (data.vector.y < -joyThreshold) newKeys.add('RIGHT');
                    } else {
                        if (data.vector.x > joyThreshold) newKeys.add('RIGHT');
                        if (data.vector.x < -joyThreshold) newKeys.add('LEFT');
                        if (data.vector.y > joyThreshold) newKeys.add('UP');
                        if (data.vector.y < -joyThreshold) newKeys.add('DOWN'); // Fixed inverted DOWN logic
                    }
                    
                    newKeys.forEach(key => {
                        if (!activeJoyKeys.has(key)) sendInput(key, 'keydown');
                    });
                    activeJoyKeys.forEach(key => {
                        if (!newKeys.has(key)) sendInput(key, 'keyup');
                    });
                    activeJoyKeys = newKeys;
                });

                joystickInstance.on('end', () => {
                    activeJoyKeys.forEach(key => sendInput(key, 'keyup'));
                    activeJoyKeys.clear();
                });
            }

            window.toggleInputMethod = function() {
                const dpad = document.getElementById('dpad-ui');
                const joy = document.getElementById('joystick-ui');
                const btn = document.getElementById('toggleInputBtn');

                if (dpad.style.display !== 'none') {
                    dpad.style.display = 'none';
                    joy.style.display = 'block';
                    btn.innerText = '➕ Use D-Pad';
                    if (!joystickInstance) initJoystick();
                } else {
                    dpad.style.display = 'grid'; 
                    joy.style.display = 'none';
                    btn.innerText = '🕹️ Use Joystick';
                    activeJoyKeys.forEach(key => sendInput(key, 'keyup'));
                    activeJoyKeys.clear();
                }
            };
        } else {
            // ==========================================
            // HOST LOGIC (LAPTOP / EMULATOR)
            // ==========================================
            peer.on('open', (myId) => {
                const currentUrl = window.location.href.split('?')[0];
                const link = `${currentUrl}?join=${myId}`; // Just the Host ID, no P1/P2 params

                new QRCode(document.getElementById('qrcode'), {
                    text: link, width: 180, height: 180, colorDark: "#000000", colorLight: "#ffffff"
                });

                peer.on('connection', (conn) => {
                    conn.on('open', () => {
                        if (availableSlots.length > 0) {
                            // Assign the lowest available slot
                            const assignedNum = availableSlots.shift(); 
                            activeClients[conn.peer] = assignedNum;

                            // Notify the client of their assignment
                            conn.send({ action: 'assign_player', playerNum: assignedNum });
                            
                            // Update Host UI
                            document.getElementById(`status-p${assignedNum}`).innerText = 'Connected!';
                        } else {
                            // Reject if full
                            conn.send({ action: 'full' });
                            setTimeout(() => conn.close(), 500);
                        }
                    });

                    conn.on('data', (data) => {
                        if (data.button && data.type) {
                            // Look up which player this connection belongs to securely
                            const pNum = activeClients[conn.peer];
                            if (pNum) {
                                triggerKeystroke(pNum.toString(), data.button, data.type);
                            }
                        }
                    });

                    conn.on('close', () => {
                        const pNum = activeClients[conn.peer];
                        if (pNum) {
                            // Reclaim the slot
                            availableSlots.push(pNum);
                            availableSlots.sort(); // Ensure 1 comes before 2 if both drop
                            delete activeClients[conn.peer];
                            
                            // Update Host UI
                            document.getElementById(`status-p${pNum}`).innerText = 'Waiting...';
                        }
                    });
                });
            });

            function triggerKeystroke(playerNum, btnName, eventType) {
                const keyData = keyMap[playerNum][btnName];
                if (!keyData) return;

                const targetElement = document.querySelector('#game-container canvas') || window;

                let physCode = keyData.key;
                if (!physCode.startsWith('Arrow') && physCode !== 'Enter' && physCode !== 'Shift') {
                    physCode = 'Key' + physCode.toUpperCase(); 
                } else if (physCode === 'Shift') {
                    physCode = 'ShiftLeft';
                }

                const event = new KeyboardEvent(eventType, {
                    key: keyData.key,
                    code: physCode,
                    keyCode: keyData.keyCode,
                    which: keyData.keyCode,
                    bubbles: true,
                    cancelable: true,
                    composed: true
                });

                Object.defineProperty(event, 'keyCode', { get: () => keyData.keyCode });
                Object.defineProperty(event, 'which', { get: () => keyData.keyCode });

                targetElement.dispatchEvent(event);
            }

            // EmulatorJS Config
            window.EJS_defaultControls = {
                0: { 
                    0: { value: 'x' }, 1: { value: 'z' }, 2: { value: 'Shift' }, 3: { value: 'Enter' }, 
                    4: { value: 'up arrow' }, 5: { value: 'down arrow' }, 6: { value: 'left arrow' }, 
                    7: { value: 'right arrow' }, 8: { value: 's' }, 9: { value: 'a' }          
                },
                1: { 
                    0: { value: 'g' }, 1: { value: 'f' }, 2: { value: 'b' }, 3: { value: 'v' }, 
                    4: { value: 'i' }, 5: { value: 'k' }, 6: { value: 'j' }, 7: { value: 'l' }, 
                    8: { value: 'h' }, 9: { value: 't' }   
                },
        2: {},
        3: {}
            };

            window.EJS_player = '#game-container'; 
            window.EJS_core = 'psx';               
            window.EJS_gameName = 'Tekken 3';      
            window.EJS_color = '#d32f2f';
            window.EJS_gameUrl = 'https://huggingface.co/datasets/alihxn/compressed_game/resolve/main/tekken3.chd'; 
            window.EJS_biosUrl = 'scph5501.bin'; 
            EJS_loadStateURL = "Tekken 3.state";
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        }
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
